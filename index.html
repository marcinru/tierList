<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tier List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="wrapper">
      <section class="tier-section">
        <h1>S</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>A</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>B</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>C</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>D</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>E</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>F</h1>
        <div class="drop-zone"></div>
      </section>
      <div id="unranked" class="drop-zone">
        <div draggable="true" class="item">🍕</div>
        <div draggable="true" class="item">🍔</div>
        <div draggable="true" class="item">🍟</div>
        <div draggable="true" class="item">🍗</div>
        <div draggable="true" class="item">🍦</div>
        <div draggable="true" class="item">🍓</div>
        <div draggable="true" class="item">🍌</div>
      </div>
    </div>
  </body>
</html>
