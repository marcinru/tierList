<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tier List</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div id="wrapper">
      <section class="tier-section">
        <h1>S</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>A</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>B</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>C</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>D</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>E</h1>
        <div class="drop-zone"></div>
      </section>
      <section class="tier-section">
        <h1>F</h1>
        <div class="drop-zone"></div>
      </section>
      <div class="tier-section" id="unranked">
        <h1>U</h1>
        <div class="drop-zone">
          <div draggable="true" class="item" aria-label="pizza">🍕</div>
          <div draggable="true" class="item" aria-label="burger">🍔</div>
          <div draggable="true" class="item" aria-label="frytki">🍟</div>
          <div draggable="true" class="item" aria-label="kurczak">🍗</div>
          <div draggable="true" class="item" aria-label="lody">🍦</div>
          <div draggable="true" class="item" aria-label="truskawki">🍓</div>
          <div draggable="true" class="item" aria-label="banany">🍌</div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
